<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedí tu turno</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f7f5f2;--white:#fff;--ink:#1a1a1a;--ink-soft:#555;--ink-dim:#999;--line:#e8e4df;--green:#2d7d5f;--green-bg:#edf5f1;--red:#dc2626;--shadow-md:0 4px 24px rgba(0,0,0,.10);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.loader-overlay{position:fixed;inset:0;background:rgba(247,245,242,.9);display:flex;align-items:center;justify-content:center;z-index:200;transition:opacity .2s;}
.loader-overlay.hide{opacity:0;pointer-events:none;}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--green);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.page{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px;}
.card{background:var(--white);border-radius:18px;border:1px solid var(--line);box-shadow:var(--shadow-md);width:100%;max-width:440px;overflow:hidden;}
.card-header{background:var(--green);padding:24px 28px 20px;}
.header-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.header-name{font-family:'Playfair Display',serif;font-size:22px;color:#fff;}
.header-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px;}
.card-body{padding:24px 28px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:9px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--green);background:var(--white);}
.divider{border:none;border-top:1px solid var(--line);margin:20px 0;}

/* FIXED SLOT — cuando viene con link fijo */
.fixed-slot{background:var(--green-bg);border:1.5px solid #c8e6da;border-radius:10px;padding:14px 16px;margin-bottom:4px;}
.fixed-slot-label{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.fixed-slot-value{font-size:18px;font-weight:600;color:var(--ink);}
.fixed-slot-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-month{font-size:14px;font-weight:600;}
.cal-nav-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:transparent;cursor:pointer;font-size:13px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cal-nav-btn:hover{background:var(--bg);}
.cal-nav-btn[disabled]{opacity:.25;pointer-events:none;}
.days-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.day-name{text-align:center;font-size:10px;font-weight:600;color:var(--ink-dim);padding:3px 0;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--ink);transition:all .12s;}
.day:hover:not(.empty):not(.past):not(.no-slot){background:var(--bg);}
.day.empty{pointer-events:none;opacity:0;}
.day.past{color:var(--ink-dim);pointer-events:none;}
.day.no-slot{color:var(--line);pointer-events:none;}
.day.today{font-weight:700;color:var(--green);}
.day.selected{background:var(--green);color:#fff!important;}

/* TIME SLOTS */
.slots-section{margin-top:16px;}
.slots-title{font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.time-btn{padding:10px 4px;border:1.5px solid var(--line);border-radius:8px;background:var(--white);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--ink-soft);cursor:pointer;transition:all .12s;text-align:center;}
.time-btn:hover{border-color:var(--green);color:var(--green);}
.time-btn.selected{background:var(--green);border-color:var(--green);color:#fff;}
.time-btn.taken{opacity:.35;pointer-events:none;text-decoration:line-through;}

.submit-btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;border-radius:10px;margin-top:20px;transition:all .15s;}
.submit-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,125,95,.3);}
.submit-btn:disabled{opacity:.45;pointer-events:none;transform:none;}
.error-msg{font-size:12px;color:var(--red);margin-top:8px;text-align:center;display:none;}
.error-msg.show{display:block;}

/* SUCCESS */
.success{display:none;flex-direction:column;align-items:center;text-align:center;padding:48px 28px;}
.success.show{display:flex;}
.success-circle{width:64px;height:64px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin-bottom:20px;box-shadow:0 8px 28px rgba(45,125,95,.3);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success h3{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px;}
.success p{font-size:14px;color:var(--ink-dim);line-height:1.6;}
.success-detail{background:var(--green-bg);border-radius:10px;padding:14px 18px;margin-top:20px;text-align:left;width:100%;}
.success-detail div{font-size:13px;color:var(--ink-soft);padding:3px 0;}
.success-detail strong{color:var(--ink);}
</style>
</head>
<body>
<div class="loader-overlay" id="loader"><div class="spinner"></div></div>
<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="header-label">Reservá tu turno con</div>
      <div class="header-name">Lic. en Psicología María Teresa Arauz</div>
      <div class="header-sub">Salud Mental · Corrientes</div>
    </div>

    <div id="form-body" class="card-body">
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-input" id="p-name" oninput="checkSubmit()">
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input type="tel" class="form-input" id="p-phone" oninput="checkSubmit()">
      </div>
      <hr class="divider">

      <!-- Modo link fijo -->
      <div id="fixed-mode" style="display:none;">
        <div class="fixed-slot">
          <div class="fixed-slot-label">Tu turno</div>
          <div class="fixed-slot-value" id="fixed-slot-value"></div>
          <div class="fixed-slot-sub" id="fixed-slot-sub"></div>
        </div>
      </div>

      <!-- Modo libre -->
      <div id="free-mode">
        <div class="cal-nav">
          <button class="cal-nav-btn" id="prev-btn" onclick="changeMonth(-1)">‹</button>
          <span class="cal-month" id="cal-month"></span>
          <button class="cal-nav-btn" id="next-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="days-header">
          <div class="day-name">D</div><div class="day-name">L</div><div class="day-name">M</div>
          <div class="day-name">X</div><div class="day-name">J</div><div class="day-name">V</div><div class="day-name">S</div>
        </div>
        <div class="days-grid" id="days-grid"></div>
        <div class="slots-section" id="slots-section" style="display:none;">
          <div class="slots-title" id="slots-title"></div>
          <div class="time-grid" id="time-grid"></div>
        </div>
      </div>

      <div class="error-msg" id="error-msg">Hubo un error. Por favor intentá de nuevo.</div>
      <button class="submit-btn" id="submit-btn" onclick="submitForm()" disabled>Solicitar turno</button>
    </div>

    <div class="success" id="success-screen">
      <div class="success-circle">✓</div>
      <h3>¡Turno solicitado!</h3>
      <p>Tu solicitud fue enviada a la Lic. Arauz.<br>Te vamos a contactar para confirmar.</p>
      <div class="success-detail" id="success-detail"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://sqqetiycodpfhoeqwguv.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxcWV0aXljb2RwZmhvZXF3Z3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTE5MDUsImV4cCI6MjA5MjM4NzkwNX0.wwjZsLU3sDVhqM4138xTdg8gmf_lDDKJXKRtb0N1k40';
const PRO_SLUG='arauz';
const BASE_SLOTS=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00'];
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const today=new Date();today.setHours(0,0,0,0);
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

let currentMonth=new Date(today.getFullYear(),today.getMonth(),1);
let selectedDay=null,selectedTime=null,takenSlots={},blockedDays=new Set();
let fixedMode=false,fixedFecha=null,fixedHora=null;

function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function isPast(d){return d<today;}
function isSunday(d){return d.getDay()===0;}
function showLoader(v){document.getElementById('loader').classList.toggle('hide',!v);}

// Calcular fin: 2 meses completos desde hoy
function getMaxMonth(){return new Date(today.getFullYear(),today.getMonth()+2,1);}

async function loadTaken(){
  showLoader(true);
  try{
    const[t,b]=await Promise.all([
      sb.from('turnos').select('fecha,hora').eq('profesional_slug',PRO_SLUG),
      sb.from('dias_bloqueados').select('fecha').eq('profesional_slug',PRO_SLUG)
    ]);
    takenSlots={};
    (t.data||[]).forEach(r=>{if(!takenSlots[r.fecha])takenSlots[r.fecha]=[];takenSlots[r.fecha].push(r.hora);});
    blockedDays=new Set((b.data||[]).map(r=>r.fecha));
  }catch(e){console.error(e);}
  showLoader(false);

  // Detectar modo: link fijo o libre
  const params=new URLSearchParams(window.location.search);
  const fecha=params.get('fecha'),hora=params.get('hora');
  if(fecha&&hora){
    fixedMode=true;fixedFecha=fecha;fixedHora=hora;
    selectedDay=fecha;selectedTime=hora;
    const d=parseDate(fecha);
    document.getElementById('fixed-mode').style.display='block';
    document.getElementById('free-mode').style.display='none';
    document.getElementById('fixed-slot-value').textContent=DAYS[d.getDay()]+' '+d.getDate()+' de '+MONTHS[d.getMonth()]+' · '+hora;
    document.getElementById('fixed-slot-sub').textContent='Turno reservado para vos';
  } else {
    renderCal();
  }
  checkSubmit();
}

function getMaxMonth(){return new Date(today.getFullYear(),today.getMonth()+2,1);}

function renderCal(){
  const maxMonth=getMaxMonth();
  const minMonth=new Date(today.getFullYear(),today.getMonth(),1);
  document.getElementById('cal-month').textContent=MONTHS[currentMonth.getMonth()]+' '+currentMonth.getFullYear();
  // flechas
  document.getElementById('prev-btn').disabled=(currentMonth<=minMonth);
  document.getElementById('next-btn').disabled=(new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,1)>=maxMonth);

  const grid=document.getElementById('days-grid');grid.innerHTML='';
  const first=new Date(currentMonth.getFullYear(),currentMonth.getMonth(),1);
  const last=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,0);
  for(let i=0;i<first.getDay();i++){const e=document.createElement('div');e.className='day empty';grid.appendChild(e);}
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(currentMonth.getFullYear(),currentMonth.getMonth(),d);
    const key=fmt(date);const div=document.createElement('div');div.className='day';div.textContent=d;
    if(date.getTime()===today.getTime())div.classList.add('today');
    if(isPast(date)||isSunday(date)||blockedDays.has(key)){div.classList.add('past');grid.appendChild(div);continue;}
    const taken=takenSlots[key]||[];
    if(BASE_SLOTS.filter(s=>!taken.includes(s)).length===0){div.classList.add('no-slot');grid.appendChild(div);continue;}
    if(selectedDay===key)div.classList.add('selected');
    (function(k,dt){div.onclick=function(){selectDay(k,dt);};})(key,date);
    grid.appendChild(div);
  }
}

function selectDay(key,date){
  selectedDay=key;selectedTime=null;renderCal();
  const taken=takenSlots[key]||[];
  const isToday=date.getTime()===today.getTime();
  const nowHour=new Date().getHours();
  const nowMin=new Date().getMinutes();
  document.getElementById('slots-title').textContent=DAYS[date.getDay()]+' '+date.getDate()+' de '+MONTHS[date.getMonth()];
  document.getElementById('time-grid').innerHTML=BASE_SLOTS.map(t=>{
    const slotHour=parseInt(t.split(':')[0]);
    const slotMin=parseInt(t.split(':')[1]);
    const isPastSlot=isToday&&(slotHour<nowHour||(slotHour===nowHour&&slotMin<=nowMin));
    const isTaken=taken.includes(t);
    return '<button class="time-btn'+((isTaken||isPastSlot)?' taken':'')+'" onclick="selectTime(\''+t+'\',this)">'+t+'</button>';
  }).join('');
  document.getElementById('slots-section').style.display='block';
  checkSubmit();
}

function selectTime(time,btn){
  document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');selectedTime=time;checkSubmit();
}

function changeMonth(dir){
  const next=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+dir,1);
  const min=new Date(today.getFullYear(),today.getMonth(),1);
  const max=getMaxMonth();
  if(next<min||next>=max)return;
  currentMonth=next;selectedDay=null;selectedTime=null;
  document.getElementById('slots-section').style.display='none';
  renderCal();checkSubmit();
}

function checkSubmit(){
  const n=document.getElementById('p-name').value.trim();
  const p=document.getElementById('p-phone').value.trim();
  document.getElementById('submit-btn').disabled=!(n&&p&&selectedDay&&selectedTime);
}

async function submitForm(){
  const name=document.getElementById('p-name').value.trim();
  const phone=document.getElementById('p-phone').value.trim();
  const errEl=document.getElementById('error-msg');errEl.classList.remove('show');
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='Enviando...';
  try{
    const{error}=await sb.from('turnos').insert([{profesional_slug:PRO_SLUG,nombre_paciente:name,telefono:phone,fecha:selectedDay,hora:selectedTime,estado:'pending'}]);
    if(error)throw error;
    document.getElementById('form-body').style.display='none';
    document.getElementById('success-screen').classList.add('show');
    const d=parseDate(selectedDay);
    document.getElementById('success-detail').innerHTML='<div><strong>Paciente:</strong> '+name+'</div><div><strong>Fecha:</strong> '+DAYS[d.getDay()]+' '+d.getDate()+' de '+MONTHS[d.getMonth()]+'</div><div><strong>Hora:</strong> '+selectedTime+'</div><div><strong>Estado:</strong> Pendiente de confirmación</div>';
  }catch(e){errEl.classList.add('show');btn.disabled=false;btn.textContent='Solicitar turno';console.error(e);}
}

loadTaken();
</script>
</body>
</html>
